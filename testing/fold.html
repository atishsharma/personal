<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ATS FOLD VAULT – Pure Wireframe Engine</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary-glow: #00f0ff;
            --bg-color: #03060a;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--primary-glow);
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .scanlines {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 240, 255, 0.05) 51%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 5;
            animation: scanlineScroll 10s linear infinite;
        }

        @keyframes scanlineScroll { 0% { background-position: 0 0; } 100% { background-position: 0 100%; } }

        .hud-text {
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.9);
            letter-spacing: 0.15em;
        }

        .tooltip {
            position: absolute;
            background: rgba(0, 15, 25, 0.95);
            border: 1px solid var(--primary-glow);
            padding: 10px 14px;
            color: var(--primary-glow);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
            backdrop-filter: blur(8px);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 50;
        }

        .glass-panel {
            background: rgba(3, 6, 10, 0.95);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 240, 255, 0.3);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.1);
        }

        .dim-box {
            border-left: 2px solid var(--primary-glow);
            padding-left: 10px;
            background: linear-gradient(90deg, rgba(0, 240, 255, 0.08), transparent);
        }

        .layer-btn {
            pointer-events: auto;
            background: rgba(0, 15, 25, 0.85);
            border: 1px solid rgba(0, 240, 255, 0.4);
            transition: all 0.2s;
        }
        .layer-btn:hover { background: rgba(0, 240, 255, 0.2); border-color: var(--primary-glow); box-shadow: 0 0 10px rgba(0, 240, 255, 0.3); }
        .layer-btn.active { background: rgba(0, 240, 255, 0.3); border-color: var(--primary-glow); box-shadow: 0 0 15px rgba(0, 240, 255, 0.5); }

        /* LIGHT MODE OVERRIDES */
        body.light-mode {
            --bg-color: #f8fafc;
            --primary-glow: #0284c7;
        }
        body.light-mode .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            border-color: rgba(2, 132, 199, 0.3);
            box-shadow: 0 0 30px rgba(2, 132, 199, 0.15);
        }
        body.light-mode .layer-btn {
            background: rgba(255, 255, 255, 0.9);
            border-color: rgba(2, 132, 199, 0.4);
            color: #0284c7 !important;
        }
        body.light-mode .layer-btn:hover, body.light-mode .layer-btn.active {
            background: rgba(2, 132, 199, 0.15);
            border-color: #0284c7 !important;
            box-shadow: 0 0 15px rgba(2, 132, 199, 0.3);
        }
        body.light-mode .tooltip {
            background: rgba(255, 255, 255, 0.95);
            border-color: #0284c7;
            color: #0284c7;
            box-shadow: 0 0 20px rgba(2, 132, 199, 0.2);
        }
        body.light-mode #loading, body.light-mode #vault-overlay, body.light-mode #selector-overlay {
            background-color: rgba(248, 250, 252, 0.95) !important;
        }
        body.light-mode input {
            background: rgba(255, 255, 255, 0.8) !important;
            border-color: rgba(2, 132, 199, 0.4) !important;
            color: #0284c7 !important;
        }
        body.light-mode .text-cyan-300, body.light-mode .text-cyan-400, 
        body.light-mode .text-cyan-500, body.light-mode .text-cyan-600, 
        body.light-mode .text-cyan-800, body.light-mode .text-cyan-900 {
            color: #0284c7 !important;
        }
        body.light-mode .border-cyan-500\/30, body.light-mode .border-cyan-800, body.light-mode .border-cyan-900 {
            border-color: rgba(2, 132, 199, 0.3) !important;
        }
        body.light-mode .bg-black\/60, body.light-mode .bg-black\/80, body.light-mode .bg-black {
            background-color: rgba(255, 255, 255, 0.8) !important;
        }
        body.light-mode .dim-box {
            background: linear-gradient(90deg, rgba(2, 132, 199, 0.1), transparent);
        }
    </style>

    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="loading" class="absolute inset-0 z-[200] bg-black flex items-center justify-center transition-opacity duration-500">
        <div class="flex flex-col items-center">
            <div class="w-12 h-12 border-2 border-cyan-500/20 border-t-cyan-400 rounded-full animate-spin mb-4"></div>
            <div class="hud-text text-[10px] uppercase">Calibrating Wireframe Engine...</div>
        </div>
    </div>

    <!-- LOCK SCREEN -->
    <div id="vault-overlay" class="absolute inset-0 z-[100] bg-[#03060a] flex flex-col items-center justify-center font-mono text-center px-4 transition-opacity duration-500 pointer-events-auto">
        <div class="glass-panel p-12 flex flex-col items-center w-full max-w-md">
            <h1 class="text-cyan-400 text-3xl mb-2 tracking-[0.4em] hud-text">ATS FOLD VAULT</h1>
            <p class="text-cyan-600 text-[10px] mb-8 tracking-widest">PURE WIRE-FRAME ENGINEERING LAB</p>
            <input type="password" id="vault-password" placeholder="ENTER SECURE KEY" maxlength="4" class="bg-black/80 border border-cyan-800 text-cyan-400 px-4 py-4 text-center tracking-[0.8em] focus:outline-none focus:border-cyan-400 mb-4 w-full uppercase transition-colors">
            <p class="text-cyan-900 text-[9px] mt-2 uppercase tracking-widest">System unlocks automatically on valid sequence</p>
            <p id="hint" class="text-cyan-900/60 text-[9px] mt-4 uppercase tracking-widest">Master Key: 0000</p>
        </div>
    </div>

    <!-- PROTOTYPE SELECTOR -->
    <div id="selector-overlay" class="absolute inset-0 z-[90] bg-[#03060a]/95 backdrop-blur-xl hidden flex-col items-center justify-center p-8 transition-opacity duration-500 pointer-events-auto">
        <button id="btn-close-selector" class="absolute top-8 right-8 p-3 text-cyan-500 hover:text-cyan-300 transition-colors cursor-pointer bg-black/50 border border-cyan-900 rounded-full">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
        <h2 class="text-cyan-400 text-2xl mb-10 tracking-[0.4em] hud-text text-center">FOLDING PHONES</h2>
        <div id="phone-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4 max-w-6xl w-full overflow-y-auto pb-10"></div>
    </div>

    <div id="canvas-container"></div>
    <div class="scanlines"></div>

    <!-- MAIN HUD -->
    <div id="ui-layer">
        <div class="p-6 flex flex-col sm:flex-row justify-between items-start w-full gap-4 pointer-events-none">
            <div>
                <h1 id="hud-title" class="text-2xl md:text-4xl font-bold hud-text uppercase tracking-widest">MODEL_NAME</h1>
                <p id="project-id" class="text-[10px] mt-1 opacity-80 tracking-[0.4em] text-cyan-400">CHASSIS_ID: AWAITING_DATA</p>
            </div>
            
            <div class="dim-box min-w-[150px]">
                <p class="text-[9px] opacity-60 tracking-widest uppercase mb-1">Telemetry // Footprint</p>
                <p id="dim-display" class="text-[12px] hud-text text-cyan-300 font-mono tracking-wider">00.0 x 00.0 x 00.0 mm</p>
                <p id="fold-state-text" class="text-[10px] text-cyan-500 mt-1 uppercase tracking-widest font-bold">STATE: UNKNOWN</p>
            </div>
        </div>

        <div class="absolute bottom-8 left-0 w-full px-4 flex flex-wrap justify-center gap-3 pointer-events-auto z-50">
            <button id="btn-open-selector" class="layer-btn px-6 py-4 text-[10px] tracking-widest text-cyan-400 uppercase font-bold">Prototypes</button>
            <button id="btn-fold" class="layer-btn px-6 py-4 text-[10px] tracking-widest text-cyan-400 uppercase font-bold">Toggle Fold</button>
            <button id="btn-explode" class="layer-btn px-6 py-4 text-[10px] tracking-widest text-cyan-400 uppercase font-bold">Explode Hardware</button>
            <button id="btn-rotate" class="layer-btn px-6 py-4 text-[10px] tracking-widest text-cyan-400 uppercase font-bold">Auto-Rotate</button>
            <button id="btn-theme" class="layer-btn px-6 py-4 text-[10px] tracking-widest text-cyan-400 uppercase font-bold">Light Mode</button>
            <button id="btn-close-vault" class="layer-btn px-6 py-4 text-[10px] tracking-widest text-red-500 border-red-900/50 hover:bg-red-900/30 uppercase font-bold">Close Vault</button>
        </div>

        <div id="tooltip" class="tooltip">...</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- GLOBAL STATE ---
        let isExploded = false, isAutoRotate = false, isFolded = false, isLightMode = false, currentModel = null;
        const interactables = [], explodables = [], raycastTargets = [];

        // --- 20 PROTOTYPES DATABASE ---
        const phones = [
            { id: "fold7", name: "Galaxy Z Fold 7", type: "book", w: 6.8, h: 15.5, d: 0.28, r: 0.6 },
            { id: "fold6", name: "Galaxy Z Fold 6", type: "book", w: 6.8, h: 15.3, d: 0.28, r: 0.4 },
            { id: "flip7", name: "Galaxy Z Flip 7", type: "clamshell", w: 7.2, h: 8.2, d: 0.34, r: 0.8 },
            { id: "flip6", name: "Galaxy Z Flip 6", type: "clamshell", w: 7.2, h: 8.5, d: 0.34, r: 0.5 },
            { id: "pixfold2", name: "Pixel 10 Fold", type: "book", w: 7.6, h: 14.0, d: 0.29, r: 0.7 },
            { id: "pixfold1", name: "Pixel Fold 1", type: "book", w: 8.0, h: 13.9, d: 0.30, r: 0.8 },
            { id: "razr50", name: "Moto Razr 50 Ultra", type: "clamshell", w: 7.4, h: 8.5, d: 0.35, r: 1.0 },
            { id: "findn3", name: "Oppo Find N3 Flip", type: "clamshell", w: 7.5, h: 8.2, d: 0.35, r: 0.8 },
            { id: "open3", name: "OnePlus Open 3", type: "book", w: 7.3, h: 15.3, d: 0.29, r: 0.7 },
            { id: "open1", name: "OnePlus Open 1", type: "book", w: 7.3, h: 15.3, d: 0.29, r: 0.7 },
            { id: "matext", name: "Huawei Mate XT", type: "tri", w: 7.3, h: 15.6, d: 0.22, r: 0.5 },
            { id: "matex5", name: "Huawei Mate X5", type: "book", w: 7.2, h: 15.7, d: 0.26, r: 0.8 },
            { id: "pocket2", name: "Huawei Pocket 2", type: "clamshell", w: 7.5, h: 8.5, d: 0.36, r: 1.1 },
            { id: "magicv3", name: "Honor Magic V3", type: "book", w: 7.2, h: 15.6, d: 0.22, r: 0.8 },
            { id: "magicvflip", name: "Honor Magic V Flip", type: "clamshell", w: 7.5, h: 8.6, d: 0.36, r: 0.9 },
            { id: "xfold3", name: "Vivo X Fold 3 Pro", type: "book", w: 7.3, h: 16.0, d: 0.26, r: 0.7 },
            { id: "xflip2", name: "Vivo X Flip", type: "clamshell", w: 7.5, h: 8.3, d: 0.38, r: 0.9 },
            { id: "mixfold4", name: "Xiaomi Mix Fold 4", type: "book", w: 7.3, h: 15.9, d: 0.23, r: 0.8 },
            { id: "mixflip", name: "Xiaomi Mix Flip", type: "clamshell", w: 7.4, h: 8.3, d: 0.38, r: 0.9 },
            { id: "tcltri", name: "TCL Tri-Fold Concept", type: "tri", w: 7.0, h: 16.0, d: 0.25, r: 0.5 }
        ];

        // --- DOM ELEMENTS ---
        const vaultOverlay = document.getElementById('vault-overlay');
        const selectorOverlay = document.getElementById('selector-overlay');
        const gridContainer = document.getElementById('phone-grid');
        const dimDisplay = document.getElementById('dim-display');
        const foldStateText = document.getElementById('fold-state-text');
        const vaultInput = document.getElementById('vault-password');

        // --- UI LOGIC & EVENT LISTENERS ---
        vaultInput.addEventListener('input', (e) => {
            if (e.target.value === '0000') {
                vaultOverlay.style.opacity = '0';
                vaultOverlay.style.pointerEvents = 'none';
                setTimeout(() => { 
                    vaultOverlay.classList.add('hidden'); 
                    selectorOverlay.classList.remove('hidden'); 
                    e.target.value = ''; 
                }, 500);
            }
        });

        document.getElementById('btn-close-vault').addEventListener('click', () => {
            vaultOverlay.classList.remove('hidden');
            vaultOverlay.style.pointerEvents = 'auto';
            setTimeout(() => { vaultOverlay.style.opacity = '1'; }, 10);
            vaultInput.value = '';
            vaultInput.focus();
        });

        document.getElementById('btn-close-selector').addEventListener('click', () => {
            selectorOverlay.style.opacity = '0';
            setTimeout(() => { selectorOverlay.classList.add('hidden'); selectorOverlay.style.opacity = '1'; }, 500);
        });

        document.getElementById('btn-open-selector').addEventListener('click', () => {
            selectorOverlay.classList.remove('hidden');
            setTimeout(() => { selectorOverlay.style.opacity = '1'; }, 10);
        });

        phones.forEach(proto => {
            const card = document.createElement('div');
            card.className = "border border-cyan-500/30 bg-black/60 p-6 cursor-pointer hover:border-cyan-300 hover:bg-cyan-900/40 transition-all text-center flex items-center justify-center min-h-[80px]";
            card.innerHTML = `<span class="text-[10px] tracking-widest text-cyan-400 uppercase font-bold">${proto.name}</span>`;
            card.addEventListener('click', () => {
                selectorOverlay.style.opacity = '0';
                setTimeout(() => { selectorOverlay.classList.add('hidden'); selectorOverlay.style.opacity = '1'; buildPhone(proto); }, 300);
            });
            gridContainer.appendChild(card);
        });

        // --- THREE.JS SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x03060a, 0.035);
        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(22, 18, 30);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.dampingFactor = 0.05;

        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.6, 0.4, 0.85);
        composer.addPass(bloomPass);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const pLight = new THREE.PointLight(0x00ffff, 4, 100); pLight.position.set(20, 20, 20); scene.add(pLight);

        let grid = new THREE.GridHelper(100, 60, 0x00ffff, 0x001122);
        grid.position.y = -10; grid.material.opacity = 0.15; grid.material.transparent = true; scene.add(grid);

        const mainGroup = new THREE.Group();
        scene.add(mainGroup);

        let pivotA = new THREE.Group();
        let pivotB = new THREE.Group();
        let pivotC = new THREE.Group();

        // --- CORE MATERIALS ---
        const chassisMat = new THREE.MeshStandardMaterial({ color: 0x020508, roughness: 0.2, metalness: 0.9, transparent: true, opacity: 0.85, polygonOffset: true, polygonOffsetFactor: 2, polygonOffsetUnits: 2 });
        const wireMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 1.5, wireframe: true, transparent: true, opacity: 1.0, depthWrite: true });
        const hardwareMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x00aaff, emissiveIntensity: 1.0 });
        const bezelMat = new THREE.LineBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.8 });

        // --- PURE WIREFRAME COMPONENT BUILDERS ---
        
        // 1. Create the mesh WITHOUT locking its position yet
        function createWire(geometry, matOverride) {
            const edges = new THREE.EdgesGeometry(geometry, 20); 
            const mat = matOverride instanceof THREE.Material ? matOverride : new THREE.LineBasicMaterial({ color: matOverride, transparent: true, opacity: 0.9 });
            return new THREE.LineSegments(edges, mat);
        }

        // 2. Lock the position into the animation engine AFTER it's moved to the edges
        function registerPart(mesh, name, parentGroup, ex=0, ey=0, ez=0) {
            mesh.userData.name = name;
            interactables.push(mesh);
            
            const box = new THREE.Box3().setFromObject(mesh);
            const size = box.getSize(new THREE.Vector3());
            const hit = new THREE.Mesh(new THREE.BoxGeometry(Math.max(size.x * 1.2, 0.5), Math.max(size.y * 1.2, 0.5), Math.max(size.z * 1.2, 0.5)), new THREE.MeshBasicMaterial({ visible: false }));
            hit.userData = mesh.userData;
            mesh.add(hit);
            raycastTargets.push(hit);

            // Record origin strictly based on its current offset
            mesh.userData.origPos = mesh.position.clone();
            mesh.userData.expPos = mesh.position.clone().add(new THREE.Vector3(ex, ey, ez));
            explodables.push(mesh);
            if (parentGroup) parentGroup.add(mesh);
            
            return mesh;
        }

        function createChassisFrame(w, h, d, r, name, chassisGroup) {
            const shape = new THREE.Shape();
            const x = -w/2, y = -h/2;
            shape.moveTo(x + r, y); shape.lineTo(x + w - r, y); shape.quadraticCurveTo(x + w, y, x + w, y + r);
            shape.lineTo(x + w, y + h - r); shape.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            shape.lineTo(x + r, y + h); shape.quadraticCurveTo(x, y + h, x, y + h - r);
            shape.lineTo(x, y + r); shape.quadraticCurveTo(x, y, x + r, y);
            const geo = new THREE.ExtrudeGeometry(shape, { depth: d, bevelEnabled: true, bevelSize: 0.04, bevelThickness: 0.04 });
            geo.center();
            
            const plateGroup = new THREE.Group();
            plateGroup.add(new THREE.Mesh(geo, chassisMat));
            plateGroup.add(createWire(geo, 0x00ffff));
            
            return registerPart(plateGroup, name, chassisGroup);
        }

        function createBezel(w, h, name, parentGroup, x, y, z, rotY=0, ex=0, ey=0, ez=0) {
            const geo = new THREE.PlaneGeometry(w, h);
            const bezel = createWire(geo, bezelMat);
            bezel.position.set(x, y, z);
            bezel.rotation.y = rotY;
            return registerPart(bezel, name, parentGroup, ex, ey, ez);
        }

        function addInnerCamera(parentGroup, x, y, z) {
            const geo = new THREE.CylinderGeometry(0.12, 0.12, 0.05, 16);
            geo.rotateX(Math.PI / 2);
            const cam = createWire(geo, hardwareMat);
            cam.position.set(x, y, z);
            registerPart(cam, "Under-Display Selfie Optics", parentGroup, 0, 0, 1.5);
        }

        function addCameraArray(parentGroup, modelId, type, w, h, d) {
            const camGroup = new THREE.Group();
            
            if(['fold7', 'fold6'].includes(modelId)) {
                camGroup.position.set(w/2 - 0.8, h/2 - 2.5, -d/2 - 0.1);
                const baseGeo = new THREE.BoxGeometry(1.2, 4.0, 0.2);
                const base = createWire(baseGeo, hardwareMat);
                registerPart(base, "Pro Lens Array Base", camGroup, 0, 0, -2);
                for(let i=0; i<3; i++) {
                    const lGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.1, 24); lGeo.rotateX(Math.PI/2);
                    const l = createWire(lGeo, hardwareMat);
                    l.position.set(0, 1.2 - i*1.2, -0.15);
                    registerPart(l, "Optic Element", camGroup, 0, 0, -2.5);
                }
            } 
            else if(modelId.includes('pixfold')) {
                camGroup.position.set(0, h/2 - 1.5, -d/2 - 0.1);
                const baseGeo = new THREE.BoxGeometry(w-0.5, 1.5, 0.25);
                const base = createWire(baseGeo, hardwareMat);
                registerPart(base, "Tensor Vision Visor", camGroup, 0, 0, -2);
                for(let i=0; i<3; i++) {
                    const lGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.1, 24); lGeo.rotateX(Math.PI/2);
                    const l = createWire(lGeo, hardwareMat);
                    l.position.set(-1.0 + i*1.0, -0.15);
                    registerPart(l, "Optic Element", camGroup, 0, 0, -2.5);
                }
            }
            else if(['open1', 'open3', 'xfold3', 'mixfold4', 'matex5', 'magicv3'].includes(modelId)) {
                camGroup.position.set(0, h/2 - 2.5, -d/2 - 0.1);
                const ringGeo = new THREE.CylinderGeometry(1.6, 1.6, 0.2, 32); ringGeo.rotateX(Math.PI/2);
                const ring = createWire(ringGeo, hardwareMat);
                registerPart(ring, "Circular Matrix Module", camGroup, 0, 0, -2);
                for(let i=0; i<3; i++) {
                    const lGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.1, 24); lGeo.rotateX(Math.PI/2);
                    const l = createWire(lGeo, hardwareMat);
                    l.position.set(Math.cos(i*Math.PI*2/3)*0.7, Math.sin(i*Math.PI*2/3)*0.7, -0.15);
                    registerPart(l, "Optic Element", camGroup, 0, 0, -2.5);
                }
            }
            else if(['findn3', 'pocket2'].includes(modelId)) {
                camGroup.position.set(-w/4, h/4, -d/2 - 0.1);
                const ringGeo = new THREE.CylinderGeometry(1.2, 1.2, 0.2, 32); ringGeo.rotateX(Math.PI/2);
                const ring = createWire(ringGeo, hardwareMat);
                registerPart(ring, "Hasselblad Matrix", camGroup, 0, 0, -2);
                for(let i=0; i<3; i++) {
                    const lGeo = new THREE.CylinderGeometry(0.25, 0.25, 0.1, 24); lGeo.rotateX(Math.PI/2);
                    const l = createWire(lGeo, hardwareMat);
                    l.position.set(Math.cos(i*Math.PI*2/3)*0.5, Math.sin(i*Math.PI*2/3)*0.5, -0.15);
                    registerPart(l, "Optic Element", camGroup, 0, 0, -2.5);
                }
            }
            else if(['razr50', 'flip7', 'flip6', 'magicvflip', 'mixflip', 'xflip2'].includes(modelId)) {
                camGroup.position.set(w/4, -h/4 + 0.5, -d/2 - 0.1);
                for(let i=0; i<2; i++) {
                    const lGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.2, 24); lGeo.rotateX(Math.PI/2);
                    const l = createWire(lGeo, hardwareMat);
                    l.position.set(-0.6 + i*1.2, 0, 0);
                    registerPart(l, "Primary Optics", camGroup, 0, 0, -2);
                }
            }
            else {
                camGroup.position.set(w/2 - 1.2, h/2 - 2, -d/2 - 0.1);
                for(let i=0; i<2; i++) {
                    const lGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.2, 24); lGeo.rotateX(Math.PI/2);
                    const l = createWire(lGeo, hardwareMat);
                    l.position.set(0, 0.6 - i*1.2, 0);
                    registerPart(l, "Primary Optics", camGroup, 0, 0, -2);
                }
            }
            parentGroup.add(camGroup);
        }

        // --- MASTER ASSEMBLY ENGINE ---
        function buildPhone(proto) {
            mainGroup.clear(); interactables.length = 0; explodables.length = 0; raycastTargets.length = 0;
            isFolded = false; currentModel = proto;
            document.getElementById('hud-title').innerText = proto.name;
            document.getElementById('project-id').innerText = `CHASSIS_ID: ${proto.id.toUpperCase()}_v${(Math.random()*9).toFixed(1)}`;

            pivotA = new THREE.Group(); pivotB = new THREE.Group(); pivotC = new THREE.Group();
            mainGroup.add(pivotA);

            const {w, h, d, r, type, id} = proto;

            const chassisA = new THREE.Group();
            const chassisB = new THREE.Group();
            const chassisC = new THREE.Group();

            if (type === "clamshell") {
                pivotA.position.set(0,0,0);
                pivotA.add(chassisA);
                chassisA.position.set(0, -h/2, 0);

                pivotB.position.set(0, 0, d/2); 
                pivotA.add(pivotB);
                pivotB.add(chassisB);
                chassisB.position.set(0, h/2, -d/2);

                createChassisFrame(w, h, d, r, "Lower Body", chassisA);
                createChassisFrame(w, h, d, r, "Upper Body", chassisB);
                
                // USB-C firmly bolted to the bottom rail
                const usbGeo = new THREE.BoxGeometry(0.6, 0.08, 0.15);
                const usb = createWire(usbGeo, hardwareMat);
                usb.position.set(0, -h/2, 0);
                registerPart(usb, "USB-C I/O Port", chassisA, 0, -1, 0);

                // Buttons secured to the right-hand outer rail
                const btnGrp = new THREE.Group();
                chassisB.add(btnGrp);
                
                const pwrGeo = new THREE.BoxGeometry(0.06, 0.8, 0.1);
                const pwr = createWire(pwrGeo, hardwareMat);
                pwr.position.set(w/2, 0, 0);
                registerPart(pwr, "Power Scanner", btnGrp, 1.5, 0, 0); 
                
                const volGeo = new THREE.BoxGeometry(0.06, 1.6, 0.1);
                const vol = createWire(volGeo, hardwareMat);
                vol.position.set(w/2, 1.2, 0);
                registerPart(vol, "Volume Rocker", btnGrp, 1.5, 0, 0);

                createBezel(w-0.2, h-0.1, "Lower Inner Display Bezel", chassisA, 0, 0, d/2+0.01, 0, 0, 0, 1.5);
                createBezel(w-0.2, h-0.1, "Upper Inner Display Bezel", chassisB, 0, 0, d/2+0.01, 0, 0, 0, 1.5);
                addInnerCamera(chassisB, 0, h/2 - 0.4, d/2 + 0.01);

                if(id === 'razr50' || id === 'mixflip' || id === 'magicvflip') {
                    createBezel(w-0.4, h-0.4, "Full Cover Screen Bezel", chassisB, 0, 0, -d/2-0.01, Math.PI, 0, 0, -1.5);
                } else if(id === 'findn3' || id === 'pocket2') {
                    createBezel(w*0.4, h-0.8, "Vertical Cover Display Bezel", chassisB, w/4, 0, -d/2-0.01, Math.PI, 0, 0, -1.5);
                } else {
                    createBezel(w-1, h/2.5, "Standard Cover Display Bezel", chassisB, 0, -h/4 + 0.5, -d/2-0.01, Math.PI, 0, 0, -1.5);
                }
                addCameraArray(chassisB, id, type, w, h, d);

                const hingeGeo = new THREE.CylinderGeometry(0.1, 0.1, w*0.9, 24); hingeGeo.rotateZ(Math.PI/2);
                const hinge = createWire(hingeGeo, hardwareMat);
                hinge.position.set(0, 0, d/2);
                registerPart(hinge, "Mechanical Hinge", mainGroup);

            } else if (type === "book") {
                pivotA.position.set(0,0,0);
                pivotA.add(chassisA);
                chassisA.position.set(-w/2, 0, 0);

                pivotB.position.set(0, 0, d/2); 
                pivotA.add(pivotB);
                pivotB.add(chassisB);
                chassisB.position.set(w/2, 0, -d/2);

                createChassisFrame(w, h, d, r, "Left Frame", chassisA);
                createChassisFrame(w, h, d, r, "Right Frame", chassisB);

                const usbGeo = new THREE.BoxGeometry(0.6, 0.08, 0.15);
                const usb = createWire(usbGeo, hardwareMat);
                usb.position.set(0, -h/2, 0);
                registerPart(usb, "USB-C Port", chassisB, 0, -1, 0);

                const btnGrp = new THREE.Group();
                chassisB.add(btnGrp);
                
                const pwrGeo = new THREE.BoxGeometry(0.06, 0.8, 0.1);
                const pwr = createWire(pwrGeo, hardwareMat);
                pwr.position.set(w/2, 1.0, 0);
                registerPart(pwr, "Power Scanner", btnGrp, 1.5, 0, 0);
                
                const volGeo = new THREE.BoxGeometry(0.06, 1.6, 0.1);
                const vol = createWire(volGeo, hardwareMat);
                vol.position.set(w/2, 2.4, 0);
                registerPart(vol, "Volume Rocker", btnGrp, 1.5, 0, 0);

                createBezel(w-0.2, h-0.2, "Main Foldable Bezel (Left)", chassisA, 0, 0, d/2+0.01, 0, 0, 0, 1.5);
                createBezel(w-0.2, h-0.2, "Main Foldable Bezel (Right)", chassisB, 0, 0, d/2+0.01, 0, 0, 0, 1.5);
                addInnerCamera(chassisB, w/2 - 0.4, h/2 - 0.4, d/2 + 0.01);

                createBezel(w-0.4, h-0.4, "Cover Display Bezel", chassisA, 0, 0, -d/2-0.01, Math.PI, 0, 0, -1.5);
                addCameraArray(chassisB, id, type, w, h, d);

                const hingeGeo = new THREE.CylinderGeometry(0.1, 0.1, h*0.9, 24);
                const hinge = createWire(hingeGeo, hardwareMat);
                hinge.position.set(0, 0, d/2); 
                registerPart(hinge, "Mechanical Hinge", mainGroup);

            } else if (type === "tri") {
                pivotA.position.set(0,0,0);
                pivotA.add(chassisA);
                chassisA.position.set(-w/2, 0, 0);

                pivotB.position.set(0, 0, d/2);
                pivotA.add(pivotB);
                pivotB.add(chassisB);
                chassisB.position.set(w/2, 0, -d/2);

                pivotC.position.set(w, 0, -d); 
                pivotB.add(pivotC);
                pivotC.add(chassisC);
                chassisC.position.set(w/2, 0, d/2);

                createChassisFrame(w, h, d, r, "Left Leaf", chassisA);
                createChassisFrame(w, h, d, r, "Center Frame", chassisB);
                createChassisFrame(w, h, d, r, "Right Leaf", chassisC);
                
                const usbGeo = new THREE.BoxGeometry(0.6, 0.08, 0.15);
                const usb = createWire(usbGeo, hardwareMat);
                usb.position.set(0, -h/2, 0);
                registerPart(usb, "Central USB-C", chassisB, 0, -1, 0);

                const btnGrp = new THREE.Group();
                chassisC.add(btnGrp);
                
                const pwrGeo = new THREE.BoxGeometry(0.06, 0.8, 0.1);
                const pwr = createWire(pwrGeo, hardwareMat);
                pwr.position.set(w/2, 1.0, 0);
                registerPart(pwr, "Power Scanner", btnGrp, 1.5, 0, 0);
                
                const volGeo = new THREE.BoxGeometry(0.06, 1.6, 0.1);
                const vol = createWire(volGeo, hardwareMat);
                vol.position.set(w/2, 2.4, 0);
                registerPart(vol, "Volume Rocker", btnGrp, 1.5, 0, 0);

                createBezel(w-0.1, h-0.2, "Tri-Fold Matrix (Left)", chassisA, 0, 0, d/2+0.01, 0, 0, 0, 1.5);
                createBezel(w-0.1, h-0.2, "Tri-Fold Matrix (Center)", chassisB, 0, 0, d/2+0.01, 0, 0, 0, 1.5);
                createBezel(w-0.1, h-0.2, "Tri-Fold Matrix (Right)", chassisC, 0, 0, d/2+0.01, 0, 0, 0, 1.5);
                addInnerCamera(chassisA, -w/2 + 0.4, h/2 - 0.4, d/2 + 0.01);

                createBezel(w-0.4, h-0.4, "Collapsed Cover Bezel", chassisA, 0, 0, -d/2-0.01, Math.PI, 0, 0, -1.5);
                addCameraArray(chassisC, 'generic', type, w, h, d);

                const hingeGeo = new THREE.CylinderGeometry(0.1, 0.1, h*0.9, 24);
                
                const h1 = createWire(hingeGeo, hardwareMat);
                h1.position.set(0,0,d/2);
                registerPart(h1, "Primary Hinge", pivotA);
                
                const h2 = createWire(hingeGeo, hardwareMat);
                h2.position.set(w,0,-d);
                registerPart(h2, "Secondary Hinge", pivotB);
            }

            mainGroup.rotation.set(0.1, -Math.PI/6, 0);
            updateHUD();
        }

        // --- HUD UPDATER ---
        function updateHUD() {
            if(!currentModel) return;
            const {w, h, d, type} = currentModel;
            let fW, fH, fD;
            
            if(type === "clamshell") { 
                fW = w; fH = isFolded ? h : h*2; fD = isFolded ? d*2 + 0.05 : d; 
            } else if(type === "book") { 
                fW = isFolded ? w : w*2; fH = h; fD = isFolded ? d*2 + 0.05 : d; 
            } else { 
                fW = isFolded ? w : w*3; fH = h; fD = isFolded ? d*3 + 0.1 : d; 
            }
            
            dimDisplay.innerText = `${(fW*10).toFixed(1)} x ${(fH*10).toFixed(1)} x ${(fD*10).toFixed(1)} mm`;
            foldStateText.innerText = `STATE: ${isFolded ? 'COLLAPSED' : 'EXPANDED'}`;
        }

        // --- INTERACTION BINDINGS ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const tooltip = document.getElementById('tooltip');

        window.addEventListener('pointermove', (e) => {
            mouse.x = (e.clientX/window.innerWidth)*2-1; mouse.y = -(e.clientY/window.innerHeight)*2+1;
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects(raycastTargets);
            if (hits.length > 0) {
                tooltip.style.opacity = '1'; tooltip.style.left = e.clientX+15+'px'; tooltip.style.top = e.clientY+15+'px';
                tooltip.innerText = hits[0].object.userData.name; document.body.style.cursor = 'crosshair';
            } else { tooltip.style.opacity = '0'; document.body.style.cursor = 'default'; }
        });

        document.getElementById('btn-fold').addEventListener('click', (e) => { 
            isFolded = !isFolded; 
            e.currentTarget.classList.toggle('active', isFolded);
            updateHUD(); 
        });
        document.getElementById('btn-explode').addEventListener('click', (e) => { 
            isExploded = !isExploded;
            e.currentTarget.classList.toggle('active', isExploded);
        });
        document.getElementById('btn-rotate').addEventListener('click', (e) => { 
            isAutoRotate = !isAutoRotate;
            e.currentTarget.classList.toggle('active', isAutoRotate);
        });

        document.getElementById('btn-theme').addEventListener('click', (e) => {
            isLightMode = !isLightMode;
            document.body.classList.toggle('light-mode', isLightMode);
            e.currentTarget.innerText = isLightMode ? 'DARK MODE' : 'LIGHT MODE';
            
            // Update Three.js Environment for a crisp "Blueprint on Paper" aesthetic
            scene.fog.color.setHex(isLightMode ? 0xf8fafc : 0x03060a);
            chassisMat.color.setHex(isLightMode ? 0xe2e8f0 : 0x020508);
            chassisMat.opacity = isLightMode ? 0.6 : 0.85;
            
            // Dark, sharp lines for light mode
            wireMat.color.setHex(isLightMode ? 0x0f172a : 0x00ffff); // Near Black
            wireMat.emissive.setHex(isLightMode ? 0x1e3a8a : 0x00ffff); // Subtle Blue glow
            wireMat.emissiveIntensity = isLightMode ? 0.2 : 1.5;
            
            hardwareMat.color.setHex(isLightMode ? 0x0f172a : 0xffffff); 
            hardwareMat.emissive.setHex(isLightMode ? 0xc2410c : 0x00aaff); // Burnt orange hardware
            hardwareMat.emissiveIntensity = isLightMode ? 0.4 : 1.0;
            
            bezelMat.color.setHex(isLightMode ? 0x4338ca : 0x00ffff); // Deep Indigo bezels
            
            // Kill bloom almost entirely to prevent bright washout
            bloomPass.strength = isLightMode ? 0.05 : 1.6;
            
            // Rebuild Grid
            scene.remove(grid);
            grid = new THREE.GridHelper(100, 60, isLightMode ? 0x94a3b8 : 0x00ffff, isLightMode ? 0xe2e8f0 : 0x001122);
            grid.position.y = -10;
            grid.material.opacity = isLightMode ? 0.6 : 0.15;
            grid.material.transparent = true;
            scene.add(grid);
        });

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            if (isAutoRotate) mainGroup.rotation.y += 0.005;
            
            if (currentModel) {
                if (currentModel.type === "clamshell") {
                    const target = isFolded ? Math.PI : 0;
                    pivotB.rotation.x = THREE.MathUtils.lerp(pivotB.rotation.x, target, 0.08);
                } 
                else if (currentModel.type === "tri") {
                    const target = isFolded ? Math.PI : 0;
                    pivotB.rotation.y = THREE.MathUtils.lerp(pivotB.rotation.y, target, 0.08);
                    pivotC.rotation.y = THREE.MathUtils.lerp(pivotC.rotation.y, -target, 0.08);
                } 
                else {
                    const target = isFolded ? -Math.PI : 0;
                    pivotB.rotation.y = THREE.MathUtils.lerp(pivotB.rotation.y, target, 0.08);
                }
            }

            explodables.forEach(m => {
                const targetPos = isExploded ? m.userData.expPos : m.userData.origPos;
                m.position.lerp(targetPos, 0.1);
            });

            controls.update(); composer.render();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loading').style.opacity = '0';
                setTimeout(() => document.getElementById('loading').remove(), 500);
            }, 800);
            buildPhone(phones[0]);
            animate();
        };
    </script>
</body>
</html>
