<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO Tags -->
    <title>ATS Cross-Platform Packager | HTML to Desktop App Converter</title>
    <meta name="description" content="Professional ATS Cross-Platform Packager to convert HTML, CSS, and JS projects into standalone Windows (Portable EXE) and Linux (AppImage) desktop applications instantly.">
    <meta name="keywords" content="Electron packager, HTML to EXE, HTML to AppImage, ATS Desktop Builder, Cross-Platform App, Desktop App Generator, Convert Web App to Desktop">
    <meta name="author" content="Atish Ak Sharma">
    <meta name="robots" content="index, follow">
    
    <!-- Open Graph / Social Media Meta Tags -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="ATS Cross-Platform Packager">
    <meta property="og:description" content="Convert your HTML projects into professional Windows and Linux desktop applications instantly.">
    <meta property="og:image" content="https://pbs.twimg.com/profile_images/1530184439409815553/stAtZvyp_400x400.jpg">
    
    <link rel="icon" type="image/png" href="https://pbs.twimg.com/profile_images/1530184439409815553/stAtZvyp_400x400.jpg">
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel to run JSX in the browser -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide React library for icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Custom Icon component to handle lucide rendering
        const Icon = ({ name, className }) => {
            const iconRef = useRef(null);

            useEffect(() => {
                if (iconRef.current && lucide.icons[name]) {
                    // Create SVG element using lucide.createElement
                    const svg = lucide.createElement(lucide.icons[name]);
                    // Copy classes
                    if (className) {
                        className.split(' ').forEach(cls => {
                            if (cls) svg.classList.add(cls);
                        });
                    }
                    
                    // Clear and append
                    iconRef.current.innerHTML = '';
                    iconRef.current.appendChild(svg);
                }
            }, [name, className]);

            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className || ''}`} />;
        };

        const App = () => {
            const [htmlContent, setHtmlContent] = useState('');
            const [fileName, setFileName] = useState('');
            const [appName, setAppName] = useState('ATS-App');
            const [appVersion, setAppVersion] = useState('1.0.0');
            const [author, setAuthor] = useState('ATS Developer');
            const [authorEmail, setAuthorEmail] = useState('dev@ats.com');
            const [iconData, setIconData] = useState(null);
            const [iconName, setIconName] = useState('');
            const [isProcessing, setIsProcessing] = useState(false);
            const [status, setStatus] = useState({ type: '', message: '' });
            const [libLoaded, setLibLoaded] = useState(false);

            useEffect(() => {
                document.title = "ATS Cross-Platform Packager | HTML to Desktop App";
                // Add Favicon
                const link = document.querySelector("link[rel~='icon']") || document.createElement('link');
                link.type = 'image/png';
                link.rel = 'icon';
                link.href = 'https://pbs.twimg.com/profile_images/1530184439409815553/stAtZvyp_400x400.jpg';
                document.getElementsByTagName('head')[0].appendChild(link);

                // Load JSZip dynamically
                if (window.JSZip) {
                    setLibLoaded(true);
                } else {
                    const script = document.createElement('script');
                    script.src = "https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js";
                    script.async = true;
                    script.onload = () => setLibLoaded(true);
                    script.onerror = () => setStatus({ type: 'error', message: 'Failed to load internal zip library.' });
                    document.body.appendChild(script);
                }
            }, []);

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    setHtmlContent(event.target.result);
                    setFileName(file.name);
                    setStatus({ type: 'success', message: `HTML "${file.name}" loaded.` });
                };
                reader.readAsText(file);
            };

            const handleIconUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    setIconData(event.target.result.split(',')[1]); 
                    setIconName(file.name);
                };
                reader.readAsDataURL(file);
            };

            const generateZip = async () => {
                if (!htmlContent) return setStatus({ type: 'error', message: 'Upload HTML first!' });
                setIsProcessing(true);
                try {
                    const zip = new window.JSZip();
                    const folder = zip.folder(appName);
                    const buildFolder = folder.folder('build');

                    const pkg = {
                        name: appName.toLowerCase().replace(/\s+/g, '-'),
                        version: appVersion,
                        main: 'main.js',
                        author: { name: author, email: authorEmail },
                        scripts: { build: "electron-builder --win portable --linux AppImage" },
                        devDependencies: { 
                            electron: "latest", 
                            "electron-builder": "latest" 
                        },
                        build: {
                            appId: `com.ats.${appName.toLowerCase().replace(/\s+/g, '')}`,
                            productName: appName,
                            win: { target: ["portable"], icon: iconData ? "build/icon.png" : undefined },
                            linux: { target: ["AppImage"], icon: iconData ? "build/icon.png" : undefined },
                            directories: { output: "dist" }
                        }
                    };

                    const mainJs = `const { app, BrowserWindow } = require('electron'); const path = require('path'); function createWindow() { const win = new BrowserWindow({ width: 1200, height: 900, title: "${appName}", icon: path.join(__dirname, 'build/icon.png'), webPreferences: { nodeIntegration: false, contextIsolation: true } }); win.loadFile('index.html'); } app.whenReady().then(createWindow);`;

                    folder.file('package.json', JSON.stringify(pkg, null, 2));
                    folder.file('main.js', mainJs);
                    folder.file('index.html', htmlContent);
                    if (iconData) buildFolder.file('icon.png', iconData, { base64: true });

                    const content = await zip.generateAsync({ type: 'blob' });
                    const url = window.URL.createObjectURL(content);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `${appName}-ATS-Source.zip`;
                    a.click();
                    setStatus({ type: 'success', message: 'ATS Bundle Downloaded!' });
                } catch (e) { setStatus({ type: 'error', message: 'Failed to build zip.' }); }
                setIsProcessing(false);
            };

            return (
                <div className="min-h-screen p-4 md:p-8 pb-20">
                    <div className="max-w-5xl mx-auto">
                        <header className="flex items-center gap-4 mb-8">
                            <div className="bg-indigo-600 p-2 rounded-xl shadow-lg shrink-0">
                                <img src="https://pbs.twimg.com/profile_images/1530184439409815553/stAtZvyp_400x400.jpg" alt="Logo" className="w-12 h-12 rounded-lg object-cover" />
                            </div>
                            <div>
                                <h1 className="text-3xl font-extrabold tracking-tight text-slate-900">ATS Cross-Platform Packager</h1>
                                <p className="text-slate-500 font-medium italic">Professional Desktop Bundle Generator</p>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            <div className="lg:col-span-1 space-y-6">
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                    <div className="flex items-center gap-2 mb-4 text-indigo-600 font-semibold"><Icon name="Settings" className="w-5 h-5"/><h2>Metadata</h2></div>
                                    <div className="space-y-3">
                                        <input type="text" placeholder="App Name" value={appName} onChange={e => setAppName(e.target.value)} className="w-full px-3 py-2 bg-slate-50 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500"/>
                                        <input type="text" placeholder="Version" value={appVersion} onChange={e => setAppVersion(e.target.value)} className="w-full px-3 py-2 bg-slate-50 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500"/>
                                        <input type="text" placeholder="Author Name" value={author} onChange={e => setAuthor(e.target.value)} className="w-full px-3 py-2 bg-slate-50 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500"/>
                                        <input type="email" placeholder="Author Email" value={authorEmail} onChange={e => setAuthorEmail(e.target.value)} className="w-full px-3 py-2 bg-slate-50 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500"/>
                                    </div>
                                </div>
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                    <div className="flex items-center gap-2 mb-4 text-indigo-600 font-semibold"><Icon name="Image" className="w-5 h-5"/><h2>App Icon (PNG)</h2></div>
                                    <div className="relative border-2 border-dashed rounded-xl p-4 text-center hover:bg-slate-50 group">
                                        <input type="file" accept=".png" onChange={handleIconUpload} className="absolute inset-0 opacity-0 cursor-pointer" />
                                        {iconData ? (
                                            <div className="flex flex-col items-center">
                                                <img src={`data:image/png;base64,${iconData}`} className="w-12 h-12 mx-auto object-contain" />
                                                <p className="text-[10px] text-slate-500 mt-2 truncate max-w-full">{iconName}</p>
                                            </div>
                                        ) : (
                                            <div className="py-2">
                                                <Icon name="Image" className="w-8 h-8 text-slate-300 mx-auto mb-1" />
                                                <p className="text-xs text-slate-400">Click to upload icon</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>

                            <div className="lg:col-span-2 space-y-6">
                                <div className={`relative border-2 border-dashed rounded-3xl p-16 text-center bg-white group transition-all duration-300 ${htmlContent ? 'border-emerald-200 bg-emerald-50/20' : 'border-slate-200 hover:border-indigo-400'}`}>
                                    <input type="file" accept=".html" onChange={handleFileUpload} className="absolute inset-0 opacity-0 cursor-pointer" />
                                    <div className="flex flex-col items-center">
                                        {htmlContent ? (
                                            <div className="bg-emerald-100 p-4 rounded-full mb-4">
                                                <Icon name="CheckCircle2" className="w-10 h-10 text-emerald-600" />
                                            </div>
                                        ) : (
                                            <div className="bg-slate-100 p-4 rounded-full mb-4 group-hover:bg-indigo-100 transition-colors">
                                                <Icon name="Upload" className="w-10 h-10 text-slate-300 group-hover:text-indigo-500" />
                                            </div>
                                        )}
                                        <h3 className="text-xl font-bold">{htmlContent ? fileName : 'Upload index.html'}</h3>
                                    </div>
                                </div>

                                {status.message && (
                                    <div className={`p-4 rounded-xl text-sm font-semibold flex items-center gap-3 animate-in fade-in slide-in-from-top-2 duration-300 ${status.type === 'error' ? 'bg-red-50 text-red-700 border border-red-100' : 'bg-emerald-50 text-emerald-700 border border-emerald-100'}`}>
                                        {status.type === 'error' ? <Icon name="AlertCircle" className="w-5 h-5 shrink-0" /> : <Icon name="CheckCircle2" className="w-5 h-5 shrink-0" />}
                                        {status.message}
                                    </div>
                                )}

                                <div className="bg-slate-900 rounded-3xl p-8 text-white shadow-2xl relative overflow-hidden">
                                    <div className="absolute top-0 right-0 p-8 opacity-10 pointer-events-none">
                                        <Icon name="Terminal" className="w-32 h-32 rotate-12" />
                                    </div>
                                    <div className="flex flex-col md:flex-row items-center justify-between gap-6 relative z-10">
                                        <div>
                                            <h2 className="text-2xl font-bold text-white">Generate Build Bundle</h2>
                                            <div className="flex gap-2 mt-2">
                                                <span className="px-2 py-1 bg-indigo-500/20 text-indigo-300 text-[10px] font-bold rounded border border-indigo-500/30 uppercase tracking-tighter">Win Portable</span>
                                                <span className="px-2 py-1 bg-indigo-500/20 text-indigo-300 text-[10px] font-bold rounded border border-indigo-500/30 uppercase tracking-tighter">Linux AppImage</span>
                                            </div>
                                        </div>
                                        <button onClick={generateZip} disabled={!htmlContent || isProcessing || !libLoaded} className={`px-10 py-5 rounded-2xl font-black shadow-xl active:scale-95 transition-all flex items-center gap-3 ${!htmlContent || isProcessing || !libLoaded ? 'bg-slate-800 text-slate-600 cursor-not-allowed' : 'bg-indigo-600 hover:bg-indigo-500 shadow-indigo-500/20'}`}>
                                            {isProcessing ? (
                                                <>
                                                    <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin" />
                                                    Bundling...
                                                </>
                                            ) : (
                                                <>
                                                    <Icon name="Download" className="w-5 h-5" />
                                                    Download Source Zip
                                                </>
                                            )}
                                        </button>
                                    </div>
                                </div>

                                <section className="bg-white rounded-3xl p-8 border shadow-sm">
                                    <h2 className="text-xl font-bold mb-6 flex items-center gap-2"><Icon name="Layers" className="text-indigo-600 w-6 h-6"/>Post-Download Build Steps</h2>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 text-xs">
                                        <div className="p-3 bg-slate-50 rounded-xl border border-slate-100"><div className="font-bold text-indigo-600 mb-1">1. Extract</div>Unzip the source code to a folder.</div>
                                        <div className="p-3 bg-slate-50 rounded-xl border border-slate-100"><div className="font-bold text-indigo-600 mb-1">2. Terminal</div>Open terminal inside that folder.</div>
                                        <div className="p-3 bg-slate-50 rounded-xl border border-slate-100"><div className="font-bold text-indigo-600 mb-1">3. Setup</div><code className="bg-slate-200 px-1 rounded">npm install</code></div>
                                        <div className="p-3 bg-slate-50 rounded-xl border border-slate-100"><div className="font-bold text-indigo-600 mb-1">4. Build</div><code className="bg-slate-200 px-1 rounded">npm run build</code></div>
                                    </div>
                                    <div className="mt-8 pt-6 border-t border-slate-100">
                                        <h3 className="text-sm font-bold text-slate-700 mb-4 flex items-center gap-2">
                                            <Icon name="Cpu" className="w-4 h-4 text-indigo-500" />
                                            Target Specific Platform
                                        </h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div className="p-3 bg-slate-50 rounded-xl border border-slate-200">
                                                <div className="flex items-center gap-2 mb-1 text-slate-600">
                                                    <Icon name="Monitor" className="w-4 h-4" />
                                                    <span className="text-[10px] font-bold uppercase">Windows Only</span>
                                                </div>
                                                <code className="text-xs text-indigo-600 font-mono">npm run build -- --win</code>
                                            </div>
                                            <div className="p-3 bg-slate-50 rounded-xl border border-slate-200">
                                                <div className="flex items-center gap-2 mb-1 text-slate-600">
                                                    <Icon name="HardDrive" className="w-4 h-4" />
                                                    <span className="text-[10px] font-bold uppercase">Linux Only</span>
                                                </div>
                                                <code className="text-xs text-indigo-600 font-mono">npm run build -- --linux</code>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="mt-8 p-4 bg-slate-50 rounded-2xl flex items-start gap-4 border border-slate-100">
                                        <Icon name="Box" className="w-8 h-8 text-indigo-500 mt-1 shrink-0" />
                                        <div>
                                            <h4 className="text-sm font-bold">Where are my apps?</h4>
                                            <p className="text-xs text-slate-500 mt-1 leading-relaxed">
                                                Once the build finishes, a <strong>dist/</strong> folder will appear. Inside, you'll find your <strong>Portable .exe</strong> and <strong>.AppImage</strong> binaries.
                                            </p>
                                        </div>
                                    </div>
                                </section>
                            </div>
                        </div>
                        <footer className="mt-16 py-8 border-t text-center">
                            <p className="text-slate-400 text-sm font-medium italic">&copy; {new Date().getFullYear()} ATS Cross-Platform Packager - Developed by Atish Ak Sharma</p>
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
