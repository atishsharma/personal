<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO Tags -->
    <title>ATS Cross-Platform Packager | HTML to Desktop App Converter</title>
    <meta name="description" content="Professional ATS Cross-Platform Packager to convert HTML, CSS, and JS projects into standalone Windows, macOS, and Linux desktop applications instantly.">
    <meta name="keywords" content="Electron packager, HTML to EXE, HTML to AppImage, HTML to DMG, ATS Desktop Builder, Cross-Platform App, Desktop App Generator">
    <meta name="author" content="Atish Ak Sharma">
    <meta name="robots" content="index, follow">
    
    <!-- Open Graph / Social Media Meta Tags -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="ATS Cross-Platform Packager">
    <meta property="og:description" content="Convert your HTML projects into professional Windows, macOS, and Linux desktop applications instantly.">
    <meta property="og:image" content="https://pbs.twimg.com/profile_images/1530184439409815553/stAtZvyp_400x400.jpg">
    
    <link rel="icon" type="image/png" href="https://pbs.twimg.com/profile_images/1530184439409815553/stAtZvyp_400x400.jpg">
    
    <!-- Tailwind CSS Script -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind CSS config for Dark Mode -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    animation: {
                        blob: "blob 7s infinite",
                    },
                    keyframes: {
                        blob: {
                            "0%": { transform: "translate(0px, 0px) scale(1)" },
                            "33%": { transform: "translate(30px, -50px) scale(1.1)" },
                            "66%": { transform: "translate(-20px, 20px) scale(0.9)" },
                            "100%": { transform: "translate(0px, 0px) scale(1)" }
                        }
                    }
                }
            }
        };
    </script>

    <!-- React and Babel to run JSX in the browser -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide React library for icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 transition-colors duration-500 min-h-screen relative overflow-x-hidden text-slate-900 dark:text-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Custom Icon component to handle lucide rendering safely
        const Icon = ({ name, className }) => {
            const iconRef = useRef(null);

            useEffect(() => {
                if (iconRef.current && lucide.icons[name]) {
                    const svg = lucide.createElement(lucide.icons[name]);
                    if (className) {
                        className.split(' ').forEach(cls => {
                            if (cls) svg.classList.add(cls);
                        });
                    }
                    iconRef.current.innerHTML = '';
                    iconRef.current.appendChild(svg);
                }
            }, [name, className]);

            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className || ''}`} />;
        };

        // Copyable Command Block Component
        const CopyableCommand = ({ command, label }) => {
            const [copied, setCopied] = useState(false);

            const handleCopy = () => {
                const textarea = document.createElement('textarea');
                textarea.value = command;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            return (
                <div className="mt-2 w-full">
                    {label && <div className="text-[10px] text-slate-500 dark:text-slate-400 mb-1 font-bold uppercase">{label}</div>}
                    <div className="flex items-center justify-between bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg p-2 shadow-sm transition-colors group">
                        <code className="text-slate-800 dark:text-slate-200 text-xs font-mono font-semibold truncate select-all">{command}</code>
                        <button 
                            onClick={handleCopy}
                            className={`p-1.5 rounded-md transition-all ${copied ? 'bg-emerald-100 dark:bg-emerald-900/40 text-emerald-600 dark:text-emerald-400' : 'bg-slate-100 dark:bg-slate-700 text-slate-500 hover:text-indigo-600 dark:hover:text-indigo-400'}`}
                            title="Copy to clipboard"
                        >
                            {copied ? <Icon name="Check" className="w-3.5 h-3.5" /> : <Icon name="Copy" className="w-3.5 h-3.5" />}
                        </button>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [websiteFiles, setWebsiteFiles] = useState(null);
            const [folderName, setFolderName] = useState('');
            const [appName, setAppName] = useState('ATS-App');
            const [appVersion, setAppVersion] = useState('1.0.0');
            const [author, setAuthor] = useState('ATS Developer');
            const [authorEmail, setAuthorEmail] = useState('dev@ats.com');
            const [iconData, setIconData] = useState(null);
            const [iconName, setIconName] = useState('');
            const [isProcessing, setIsProcessing] = useState(false);
            const [status, setStatus] = useState({ type: '', message: '' });
            const [libLoaded, setLibLoaded] = useState(false);
            const [darkMode, setDarkMode] = useState(false);

            // Targets State
            const [targets, setTargets] = useState({
                win: ['portable'],
                linux: ['AppImage'],
                mac: []
            });

            const PLATFORMS = {
                win: { title: "Windows", icon: "Monitor", formats: ['nsis', 'portable', 'zip', 'msi', 'appx'] },
                linux: { title: "Linux", icon: "Cpu", formats: ['AppImage', 'snap', 'deb', 'rpm', 'tar.gz'] },
                mac: { title: "macOS", icon: "Laptop", formats: ['dmg', 'zip', 'pkg', 'mas'] }
            };

            const toggleTarget = (platform, format, isChecked) => {
                setTargets(prev => {
                    const platformTargets = prev[platform];
                    return {
                        ...prev,
                        [platform]: isChecked 
                            ? [...platformTargets, format] 
                            : platformTargets.filter(t => t !== format)
                    };
                });
            };

            const totalTargets = targets.win.length + targets.linux.length + targets.mac.length;

            // Handle Dark Mode Toggle at DOM level
            useEffect(() => {
                if (darkMode) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }, [darkMode]);

            useEffect(() => {
                document.title = "ATS Cross-Platform Packager | HTML to Desktop App";
                
                // Load JSZip dynamically
                if (window.JSZip) {
                    setLibLoaded(true);
                } else {
                    const script = document.createElement('script');
                    script.src = "https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js";
                    script.async = true;
                    script.onload = () => setLibLoaded(true);
                    script.onerror = () => setStatus({ type: 'error', message: 'Failed to load internal zip library.' });
                    document.body.appendChild(script);
                }
            }, []);

            const handleFolderUpload = (e) => {
                const files = Array.from(e.target.files);
                if (!files.length) return;
                
                const hasIndex = files.some(f => {
                    const parts = f.webkitRelativePath.split('/');
                    return parts.length === 2 && parts[1].toLowerCase() === 'index.html';
                });

                if (!hasIndex) {
                    setStatus({ type: 'error', message: 'No index.html found in the root of the selected folder.' });
                    return;
                }

                setWebsiteFiles(files);
                setFolderName(files[0].webkitRelativePath.split('/')[0]);
                setStatus({ type: 'success', message: `Folder "${files[0].webkitRelativePath.split('/')[0]}" loaded with ${files.length} files.` });
            };

            const handleIconUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    setIconData(event.target.result.split(',')[1]); 
                    setIconName(file.name);
                };
                reader.readAsDataURL(file);
            };

            const generateZip = async () => {
                if (!websiteFiles || websiteFiles.length === 0) return setStatus({ type: 'error', message: 'Upload a website folder first!' });
                if (totalTargets === 0) return setStatus({ type: 'error', message: 'Select at least one build target platform!' });
                
                setIsProcessing(true);
                try {
                    const zip = new window.JSZip();
                    const folder = zip.folder(appName);
                    const buildFolder = folder.folder('build');

                    let buildScriptsArgs = [];
                    let buildConfig = {
                        appId: `com.ats.${appName.toLowerCase().replace(/\s+/g, '')}`,
                        productName: appName,
                        directories: { output: "dist" }
                    };

                    if (targets.win.length > 0) {
                        buildConfig.win = { target: targets.win, icon: iconData ? "build/icon.png" : undefined };
                        buildScriptsArgs.push("--win");
                    }
                    if (targets.linux.length > 0) {
                        buildConfig.linux = { target: targets.linux, icon: iconData ? "build/icon.png" : undefined };
                        buildScriptsArgs.push("--linux");
                    }
                    if (targets.mac.length > 0) {
                        buildConfig.mac = { target: targets.mac, icon: iconData ? "build/icon.png" : undefined };
                        buildScriptsArgs.push("--mac");
                    }

                    const pkg = {
                        name: appName.toLowerCase().replace(/\s+/g, '-'),
                        version: appVersion,
                        main: 'main.js',
                        author: { name: author, email: authorEmail },
                        scripts: { 
                            start: "electron .",
                            build: `electron-builder ${buildScriptsArgs.join(' ')}` 
                        },
                        devDependencies: { 
                            electron: "latest", 
                            "electron-builder": "latest" 
                        },
                        build: buildConfig
                    };

                    const mainJs = `const { app, BrowserWindow } = require('electron'); const path = require('path'); function createWindow() { const win = new BrowserWindow({ width: 1200, height: 900, title: "${appName}", icon: path.join(__dirname, 'build/icon.png'), webPreferences: { nodeIntegration: false, contextIsolation: true } }); win.loadFile('index.html'); } app.whenReady().then(createWindow); app.on('window-all-closed', () => { if (process.platform !== 'darwin') app.quit(); });`;

                    folder.file('package.json', JSON.stringify(pkg, null, 2));
                    folder.file('main.js', mainJs);
                    
                    websiteFiles.forEach(file => {
                        const relativePath = file.webkitRelativePath.split('/').slice(1).join('/');
                        folder.file(relativePath, file);
                    });

                    if (iconData) buildFolder.file('icon.png', iconData, { base64: true });

                    const content = await zip.generateAsync({ type: 'blob' });
                    const url = window.URL.createObjectURL(content);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `${appName}-ATS-Source.zip`;
                    a.click();
                    setStatus({ type: 'success', message: 'ATS Bundle Downloaded!' });
                } catch (e) { 
                    setStatus({ type: 'error', message: 'Failed to build zip.' }); 
                    console.error(e);
                }
                setIsProcessing(false);
            };

            return (
                <div className="relative">
                    {/* Glassmorphism Background Blobs */}
                    <div className="fixed inset-0 z-[-1] overflow-hidden pointer-events-none">
                        <div className="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-indigo-300/40 dark:bg-indigo-900/40 rounded-full mix-blend-multiply dark:mix-blend-screen filter blur-[100px] opacity-70 animate-blob"></div>
                        <div className="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-purple-300/40 dark:bg-purple-900/40 rounded-full mix-blend-multiply dark:mix-blend-screen filter blur-[100px] opacity-70 animate-blob animation-delay-2000"></div>
                        <div className="absolute bottom-[-20%] left-[20%] w-[600px] h-[600px] bg-blue-300/40 dark:bg-blue-900/40 rounded-full mix-blend-multiply dark:mix-blend-screen filter blur-[100px] opacity-70 animate-blob animation-delay-4000"></div>
                    </div>

                    <div className="max-w-6xl mx-auto p-4 md:p-8 pb-20 relative z-10">
                        <header className="flex items-center justify-between gap-4 mb-10">
                            <div className="flex items-center gap-4">
                                <div className="bg-white/50 dark:bg-slate-800/50 backdrop-blur-md p-2 rounded-xl shadow-lg border border-white/50 dark:border-slate-700/50 shrink-0">
                                    <img src="https://pbs.twimg.com/profile_images/1530184439409815553/stAtZvyp_400x400.jpg" alt="Logo" className="w-10 h-10 md:w-12 md:h-12 rounded-lg object-cover shadow-sm" />
                                </div>
                                <div>
                                    <h1 className="hidden md:block text-2xl md:text-3xl font-extrabold tracking-tight text-slate-800 dark:text-white drop-shadow-sm">
                                        ATS Cross-Platform Electron Packager
                                    </h1>
                                    <h1 className="block md:hidden text-xl font-extrabold tracking-tight text-slate-800 dark:text-white drop-shadow-sm">
                                        ATS Electron Packager
                                    </h1>
                                </div>
                            </div>
                            
                            {/* Dark Mode Toggle */}
                            <button 
                                onClick={() => setDarkMode(!darkMode)}
                                className="p-3 rounded-full bg-white/70 dark:bg-slate-800/80 backdrop-blur-md shadow-sm border border-white/80 dark:border-slate-700 text-slate-600 dark:text-slate-300 hover:bg-white dark:hover:bg-slate-700 transition-all shrink-0"
                                aria-label="Toggle Dark Mode"
                            >
                                {darkMode ? <Icon name="Sun" className="w-5 h-5" /> : <Icon name="Moon" className="w-5 h-5" />}
                            </button>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            {/* Left Column: Settings */}
                            <div className="lg:col-span-1 space-y-6">
                                <div className="bg-white/60 dark:bg-slate-800/80 backdrop-blur-xl p-6 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] dark:shadow-none border border-white/80 dark:border-slate-700/50 transition-colors duration-300">
                                    <div className="flex items-center gap-2 mb-5 text-indigo-600 dark:text-indigo-400 font-bold">
                                        <Icon name="Settings" className="w-5 h-5"/>
                                        <h2>Metadata Configurations</h2>
                                    </div>
                                    <div className="space-y-4 text-sm font-medium">
                                        <div>
                                            <label className="block text-xs text-slate-500 dark:text-slate-400 mb-1 ml-1">App Name</label>
                                            <input type="text" placeholder="App Name" value={appName} onChange={e => setAppName(e.target.value)} className="w-full px-4 py-3 bg-white/50 dark:bg-slate-900/50 border border-slate-200/50 dark:border-slate-700/50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-500 shadow-sm backdrop-blur-sm"/>
                                        </div>
                                        <div>
                                            <label className="block text-xs text-slate-500 dark:text-slate-400 mb-1 ml-1">Version</label>
                                            <input type="text" placeholder="Version" value={appVersion} onChange={e => setAppVersion(e.target.value)} className="w-full px-4 py-3 bg-white/50 dark:bg-slate-900/50 border border-slate-200/50 dark:border-slate-700/50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-500 shadow-sm backdrop-blur-sm"/>
                                        </div>
                                        <div>
                                            <label className="block text-xs text-slate-500 dark:text-slate-400 mb-1 ml-1">Author Name</label>
                                            <input type="text" placeholder="Author Name" value={author} onChange={e => setAuthor(e.target.value)} className="w-full px-4 py-3 bg-white/50 dark:bg-slate-900/50 border border-slate-200/50 dark:border-slate-700/50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-500 shadow-sm backdrop-blur-sm"/>
                                        </div>
                                        <div>
                                            <label className="block text-xs text-slate-500 dark:text-slate-400 mb-1 ml-1">Author Email</label>
                                            <input type="email" placeholder="Author Email" value={authorEmail} onChange={e => setAuthorEmail(e.target.value)} className="w-full px-4 py-3 bg-white/50 dark:bg-slate-900/50 border border-slate-200/50 dark:border-slate-700/50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-500 shadow-sm backdrop-blur-sm"/>
                                        </div>
                                    </div>
                                </div>
                                <div className="bg-white/60 dark:bg-slate-800/80 backdrop-blur-xl p-6 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] dark:shadow-none border border-white/80 dark:border-slate-700/50 transition-colors duration-300">
                                    <div className="flex items-center gap-2 mb-4 text-indigo-600 dark:text-indigo-400 font-bold">
                                        <Icon name="Image" className="w-5 h-5"/>
                                        <h2>App Icon (PNG)</h2>
                                    </div>
                                    <div className="relative border-2 border-dashed border-indigo-200/60 dark:border-slate-600 bg-white/40 dark:bg-slate-900/30 rounded-2xl p-6 text-center hover:bg-white/80 dark:hover:bg-slate-700/50 transition-colors group cursor-pointer">
                                        <input type="file" accept=".png" onChange={handleIconUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                                        {iconData ? (
                                            <div className="flex flex-col items-center">
                                                <img src={`data:image/png;base64,${iconData}`} className="w-16 h-16 mx-auto object-contain drop-shadow-md rounded-lg bg-white/50 dark:bg-slate-800 p-1" />
                                                <p className="text-[10px] font-bold text-slate-600 dark:text-slate-300 mt-3 truncate max-w-full px-2">{iconName}</p>
                                            </div>
                                        ) : (
                                            <div className="py-2 pointer-events-none">
                                                <Icon name="Image" className="w-10 h-10 text-indigo-300 dark:text-slate-500 mx-auto mb-2 group-hover:text-indigo-500 dark:group-hover:text-indigo-400 transition-colors duration-300" />
                                                <p className="text-xs font-semibold text-slate-500 dark:text-slate-400">Click to upload brand icon</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>

                            {/* Right Column: Upload & Build */}
                            <div className="lg:col-span-2 flex flex-col gap-6">
                                
                                <div className="bg-white/70 dark:bg-slate-800/80 backdrop-blur-xl border border-white/80 dark:border-slate-700/50 p-4 md:px-6 md:py-4 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] dark:shadow-none flex items-center gap-4 shrink-0">
                                    <div className="bg-gradient-to-br from-indigo-500 to-purple-600 p-2.5 rounded-xl text-white shadow-md shrink-0">
                                        <Icon name="Sparkles" className="w-6 h-6" />
                                    </div>
                                    <h2 className="text-lg md:text-xl font-bold text-slate-800 dark:text-white drop-shadow-sm">
                                        Professional Desktop Bundle Generator
                                    </h2>
                                </div>

                                {/* Folder Upload Zone */}
                                <div className={`relative border-2 border-dashed rounded-3xl p-8 md:p-12 text-center transition-all duration-300 group flex-1 flex flex-col items-center justify-center ${websiteFiles ? 'border-emerald-300 dark:border-emerald-500/50 bg-emerald-50/70 dark:bg-emerald-900/20 backdrop-blur-md' : 'bg-white/50 dark:bg-slate-800/50 backdrop-blur-sm border-indigo-200 dark:border-slate-600 hover:border-indigo-400 dark:hover:border-indigo-500 hover:bg-white/80 dark:hover:bg-slate-800/80'}`}>
                                    <input type="file" webkitdirectory="true" directory="true" multiple onChange={handleFolderUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                                    <div className="flex flex-col items-center pointer-events-none">
                                        {websiteFiles ? (
                                            <div className="bg-emerald-100 dark:bg-emerald-900/60 p-5 rounded-full mb-5 shadow-inner transition-colors duration-300">
                                                <Icon name="CheckCircle2" className="w-12 h-12 text-emerald-600 dark:text-emerald-400" />
                                            </div>
                                        ) : (
                                            <div className="bg-white dark:bg-slate-700/50 p-5 rounded-full mb-5 shadow-sm group-hover:bg-indigo-50 dark:group-hover:bg-indigo-900/50 transition-colors duration-300">
                                                <Icon name="FolderOpen" className="w-12 h-12 text-indigo-300 dark:text-slate-400 group-hover:text-indigo-500 dark:group-hover:text-indigo-400 transition-colors" />
                                            </div>
                                        )}
                                        <h3 className={`text-2xl font-extrabold mb-2 ${websiteFiles ? 'text-emerald-800 dark:text-emerald-300' : 'text-slate-800 dark:text-white'}`}>
                                            {websiteFiles ? `${folderName} (${websiteFiles.length} files)` : 'Upload Website Folder'}
                                        </h3>
                                        <p className="text-slate-500 dark:text-slate-400 text-sm max-w-sm mx-auto font-medium leading-relaxed">
                                            Select a complete folder containing your <code className="bg-slate-200 dark:bg-slate-700 px-1 py-0.5 rounded text-xs font-bold text-slate-700 dark:text-slate-300">index.html</code> and all related assets.
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Platform Selectors Section */}
                        <section className="bg-white/70 dark:bg-slate-800/80 backdrop-blur-xl rounded-3xl p-8 border border-white/80 dark:border-slate-700/50 shadow-[0_8px_30px_rgb(0,0,0,0.04)] dark:shadow-none mt-10 transition-colors duration-300">
                            <h2 className="text-xl font-extrabold mb-6 flex items-center gap-3 text-slate-800 dark:text-white">
                                <div className="bg-purple-100 dark:bg-purple-500/20 p-2 rounded-lg text-purple-600 dark:text-purple-400">
                                    <Icon name="Settings2" className="w-5 h-5"/>
                                </div>
                                Target Platforms & Formats
                            </h2>
                            <p className="text-sm text-slate-500 dark:text-slate-400 mb-6 font-medium">Select the installer types and standalone formats you want `electron-builder` to configure in your package.json.</p>
                            
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                {Object.entries(PLATFORMS).map(([key, data]) => (
                                    <div key={key} className="space-y-4">
                                        <div className="flex items-center gap-2 pb-2 border-b border-slate-200 dark:border-slate-700">
                                            <Icon name={data.icon} className="w-5 h-5 text-slate-400 dark:text-slate-500" />
                                            <h3 className="font-bold text-slate-700 dark:text-slate-200">{data.title}</h3>
                                        </div>
                                        <div className="flex flex-col gap-2">
                                            {data.formats.map(format => {
                                                const isSelected = targets[key].includes(format);
                                                return (
                                                    <label key={format} className={`flex items-center gap-3 p-2.5 rounded-xl border cursor-pointer transition-colors text-sm font-semibold select-none ${isSelected ? 'bg-indigo-50/50 dark:bg-indigo-900/20 border-indigo-300 dark:border-indigo-600 text-indigo-800 dark:text-indigo-300' : 'bg-white/50 dark:bg-slate-900/50 border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400'}`}>
                                                        <input 
                                                            type="checkbox" 
                                                            checked={isSelected} 
                                                            onChange={(e) => toggleTarget(key, format, e.target.checked)} 
                                                            className="hidden" 
                                                        />
                                                        <div className={`w-4 h-4 rounded border flex items-center justify-center transition-colors ${isSelected ? 'bg-indigo-500 border-indigo-500 text-white' : 'border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800'}`}>
                                                            {isSelected && <Icon name="Check" className="w-3 h-3" />}
                                                        </div>
                                                        {format}
                                                    </label>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>

                        {status.message && (
                            <div className={`mt-8 p-4 rounded-xl text-sm font-bold flex items-center gap-3 animate-in fade-in slide-in-from-top-2 duration-300 backdrop-blur-md shadow-sm border ${status.type === 'error' ? 'bg-red-50/90 dark:bg-red-900/30 text-red-700 dark:text-red-300 border-red-200 dark:border-red-800/50' : 'bg-emerald-50/90 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-300 border-emerald-200 dark:border-emerald-800/50'}`}>
                                {status.type === 'error' ? <Icon name="AlertCircle" className="w-5 h-5 shrink-0" /> : <Icon name="CheckCircle2" className="w-5 h-5 shrink-0" />}
                                {status.message}
                            </div>
                        )}

                        {/* Build Bundle Action Box */}
                        <div className="mt-8 bg-white/80 dark:bg-slate-800/90 backdrop-blur-xl rounded-3xl p-8 shadow-[0_8px_30px_rgb(0,0,0,0.08)] dark:shadow-none border border-white dark:border-slate-700/50 relative overflow-hidden transition-colors duration-300">
                            <div className="absolute top-0 right-0 p-8 opacity-5 pointer-events-none">
                                <Icon name="Terminal" className="w-32 h-32 rotate-12 text-slate-900 dark:text-white" />
                            </div>
                            <div className="flex flex-col md:flex-row items-center justify-between gap-6 relative z-10">
                                <div className="flex-1">
                                    <h2 className="text-2xl font-extrabold text-slate-800 dark:text-white drop-shadow-sm">Generate Build Bundle</h2>
                                    <div className="flex flex-wrap gap-2 mt-3">
                                        {Object.entries(targets).flatMap(([platform, formats]) => 
                                            formats.map(format => (
                                                <span key={`${platform}-${format}`} className="px-2 py-1 bg-slate-100 dark:bg-slate-700/50 text-slate-600 dark:text-slate-300 text-[10px] font-bold rounded uppercase border border-slate-200 dark:border-slate-600">
                                                    {platform}: {format}
                                                </span>
                                            ))
                                        )}
                                        {totalTargets === 0 && <span className="text-xs text-red-500 font-bold">No targets selected!</span>}
                                    </div>
                                </div>
                                <button 
                                    onClick={generateZip} 
                                    disabled={!websiteFiles || isProcessing || !libLoaded || totalTargets === 0} 
                                    className={`px-8 py-5 rounded-2xl font-black text-white shadow-xl active:scale-95 transition-all flex items-center justify-center gap-3 w-full md:w-auto ${(!websiteFiles || isProcessing || !libLoaded || totalTargets === 0) ? 'bg-slate-300 dark:bg-slate-700 text-slate-500 dark:text-slate-400 cursor-not-allowed shadow-none' : 'bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 shadow-indigo-500/30'}`}
                                >
                                    {isProcessing ? (
                                        <>
                                            <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin" />
                                            Bundling...
                                        </>
                                    ) : (
                                        <>
                                            <Icon name="Download" className="w-5 h-5" />
                                            Download Source
                                        </>
                                    )}
                                </button>
                            </div>
                        </div>

                        {/* Full Width Post-Download Steps */}
                        <section className="bg-white/70 dark:bg-slate-800/80 backdrop-blur-xl rounded-3xl p-8 border border-white/80 dark:border-slate-700/50 shadow-[0_8px_30px_rgb(0,0,0,0.04)] dark:shadow-none mt-10 transition-colors duration-300">
                            <h2 className="text-xl font-extrabold mb-8 flex items-center gap-3 text-slate-800 dark:text-white">
                                <div className="bg-emerald-100 dark:bg-emerald-500/20 p-2 rounded-lg text-emerald-600 dark:text-emerald-400">
                                    <Icon name="Layers" className="w-5 h-5"/>
                                </div>
                                Post-Download Build Steps
                            </h2>
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 text-sm">
                                <div className="p-5 bg-white/50 dark:bg-slate-900/50 rounded-2xl border border-slate-200/60 dark:border-slate-700 shadow-sm backdrop-blur-sm transition-colors flex flex-col">
                                    <div className="flex items-center gap-2 font-bold text-emerald-600 dark:text-emerald-400 mb-2">
                                        <div className="w-6 h-6 rounded-full bg-emerald-100 dark:bg-emerald-900 flex items-center justify-center text-xs">1</div>
                                        Extract
                                    </div>
                                    <span className="text-slate-600 dark:text-slate-400 font-medium">Unzip the downloaded source code to a local folder.</span>
                                </div>
                                <div className="p-5 bg-white/50 dark:bg-slate-900/50 rounded-2xl border border-slate-200/60 dark:border-slate-700 shadow-sm backdrop-blur-sm transition-colors flex flex-col">
                                    <div className="flex items-center gap-2 font-bold text-emerald-600 dark:text-emerald-400 mb-2">
                                        <div className="w-6 h-6 rounded-full bg-emerald-100 dark:bg-emerald-900 flex items-center justify-center text-xs">2</div>
                                        Terminal
                                    </div>
                                    <span className="text-slate-600 dark:text-slate-400 font-medium">Open your command line/terminal inside that folder.</span>
                                </div>
                                <div className="p-5 bg-white/50 dark:bg-slate-900/50 rounded-2xl border border-slate-200/60 dark:border-slate-700 shadow-sm backdrop-blur-sm transition-colors flex flex-col">
                                    <div className="flex items-center gap-2 font-bold text-emerald-600 dark:text-emerald-400 mb-2">
                                        <div className="w-6 h-6 rounded-full bg-emerald-100 dark:bg-emerald-900 flex items-center justify-center text-xs">3</div>
                                        Setup
                                    </div>
                                    <div className="mt-auto pt-2">
                                        <CopyableCommand command="npm install" />
                                    </div>
                                </div>
                                <div className="p-5 bg-white/50 dark:bg-slate-900/50 rounded-2xl border border-slate-200/60 dark:border-slate-700 shadow-sm backdrop-blur-sm transition-colors flex flex-col">
                                    <div className="flex items-center gap-2 font-bold text-emerald-600 dark:text-emerald-400 mb-2">
                                        <div className="w-6 h-6 rounded-full bg-emerald-100 dark:bg-emerald-900 flex items-center justify-center text-xs">4</div>
                                        Build All Selected
                                    </div>
                                    <div className="mt-auto pt-2">
                                        <CopyableCommand command="npm run build" />
                                    </div>
                                </div>
                            </div>
                            
                            <div className="mt-8 pt-8 border-t border-slate-200/60 dark:border-slate-700/60">
                                <h3 className="text-sm font-extrabold text-slate-800 dark:text-slate-200 mb-4 flex items-center gap-2">
                                    <Icon name="Terminal" className="w-4 h-4 text-slate-500 dark:text-slate-400" />
                                    Build Specific Platforms Only
                                </h3>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <CopyableCommand command="npm run build -- --win" label="Windows Target" />
                                    <CopyableCommand command="npm run build -- --linux" label="Linux Target" />
                                    <CopyableCommand command="npm run build -- --mac" label="macOS Target" />
                                </div>
                            </div>
                        </section>

                        <footer className="mt-16 py-8 text-center text-slate-500 dark:text-slate-500 text-sm font-medium">
                            <p>&copy; {new Date().getFullYear()} ATS Cross-Platform Packager - Developed by Atish Ak Sharma</p>
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
