    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Bebas+Neue&family=Anton&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-nav { background: rgba(255,255,255,0.4); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border-bottom: 1px solid rgba(255,255,255,0.5); box-shadow: 0 4px 30px rgba(0,0,0,0.05); }

        .gradient-text { background: linear-gradient(to right, #10b981, #3b82f6, #6366f1); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; color: transparent; }
        .gradient-text-alt { background: linear-gradient(to right, #f43f5e, #8b5cf6, #3b82f6); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; color: transparent; }
        .bg-grid-pattern { background-image: linear-gradient(to right, rgba(0,0,0,0.04) 1px, transparent 1px), linear-gradient(to bottom, rgba(0,0,0,0.04) 1px, transparent 1px); background-size: 32px 32px; }
        .dark .bg-grid-pattern { background-image: linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px); }
        summary::-webkit-details-marker { display: none; }
        summary { list-style: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }

        .blink-outline { animation: outlineBlink 2.5s ease-in-out infinite; border: 1px solid transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* === HERO SECTION === */
        .hero-section { position: relative; min-height: 100vh; min-height: 100svh; background: linear-gradient(135deg, #f8f9fc 0%, #e8eaf0 100%); display: flex; align-items: flex-end; justify-content: center; overflow: hidden; z-index: 1; }
        .dark .hero-section { background: #050508; }
        .hero-glow { position: absolute; top: 45%; left: 50%; transform: translate(-50%,-50%); width: min(800px,100vw); height: min(800px,100vw); background: radial-gradient(circle, rgba(139,92,246,0.15) 0%, rgba(139,92,246,0.08) 40%, transparent 65%); border-radius: 50%; z-index: 1; pointer-events: none; }
        .dark .hero-glow { background: radial-gradient(circle, rgba(139,92,246,0.30) 0%, rgba(139,92,246,0.15) 40%, transparent 65%); }
        .hero-glow-2 { position: absolute; top: 40%; left: 50%; transform: translate(-50%,-50%); width: min(500px,65vw); height: min(500px,65vw); background: radial-gradient(circle, rgba(139,92,246,0.12) 0%, transparent 55%); border-radius: 50%; z-index: 1; pointer-events: none; animation: glowPulse 4s ease-in-out infinite; }
        .dark .hero-glow-2 { background: radial-gradient(circle, rgba(139,92,246,0.25) 0%, transparent 55%); }
        @keyframes glowPulse { 0%,100%{ opacity:.8; transform:translate(-50%,-50%) scale(1); } 50%{ opacity:1; transform:translate(-50%,-50%) scale(1.06); } }
        .hero-name-bg { position: absolute; top: 15%; left: 0; right: 0; z-index: 2; font-family: 'Anton', 'Inter', sans-serif; font-weight: 900; font-size: clamp(86px,12.5vw,237px); color: rgba(44,90,142,0.12); text-transform: uppercase; line-height: 1; text-align: center; white-space: nowrap; letter-spacing: 0.03em; pointer-events: none; user-select: none; width: 100%; }
        .dark .hero-name-bg { color: rgba(255,255,255,0.88); }
        .hero-name-mobile { display: none; }
        .hero-photo { position: relative; z-index: 3; margin-bottom: -4px; }
        .hero-photo img { width: clamp(380px,48vw,700px); height: auto; max-height: 85vh; object-fit: contain; filter: drop-shadow(0 10px 30px rgba(0,0,0,0.10)); }
        .dark .hero-photo img { filter: drop-shadow(0 10px 50px rgba(139,92,246,0.25)); }
        .hero-left { position: absolute; bottom: 10%; left: 4%; z-index: 4; max-width: 340px; }
        .hero-left p { color: #475569; font-size: 14px; line-height: 1.7; font-weight: 500; margin-bottom: 20px; }
        .dark .hero-left p { color: rgba(255,255,255,0.7); }
        .hero-socials { display: flex; gap: 10px; }
        .hero-socials a { width: 40px; height: 40px; border-radius: 50%; background: rgba(139,92,246,0.15); color: #8b5cf6; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
        .dark .hero-socials a { background: rgba(139,92,246,0.8); color: white; }
        .hero-socials a:hover { background: #8b5cf6; color: white; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(139,92,246,0.4); }
        .hero-right { position: absolute; bottom: 10%; right: 4%; z-index: 4; max-width: 300px; text-align: right; }
        .hero-right p { color: #64748b; font-size: 14px; line-height: 1.7; font-weight: 500; margin-bottom: 20px; }
        .dark .hero-right p { color: rgba(255,255,255,0.6); }
        .hero-cta { display: inline-flex; align-items: center; gap: 8px; padding: 12px 28px; border: 2px solid #8b5cf6; border-radius: 50px; color: #8b5cf6; font-weight: 700; font-size: 15px; transition: all 0.3s; text-decoration: none; }
        .dark .hero-cta { color: white; }
        .hero-cta:hover { background: #8b5cf6; color: white; transform: translateY(-2px); box-shadow: 0 8px 25px rgba(139,92,246,0.4); }
        .hero-cta-arrow { width: 32px; height: 32px; background: #8b5cf6; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; }
        .hero-scroll-btn { display: inline-flex; align-items: center; gap: 10px; padding: 12px 28px; border-radius: 50px; background: rgba(255,255,255,0.5); backdrop-filter: blur(12px); border: 1px solid rgba(139,92,246,0.3); color: #0f172a; font-weight: 700; font-size: 15px; cursor: pointer; transition: all 0.3s; text-decoration: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .dark .hero-scroll-btn { background: rgba(15,23,42,0.6); border-color: rgba(139,92,246,0.4); color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .hero-scroll-btn:hover { background: #8b5cf6; color: white; border-color: #8b5cf6; transform: translateY(-3px); box-shadow: 0 8px 25px rgba(139,92,246,0.4); }
        .hero-scroll-icon { width: 28px; height: 28px; border-radius: 50%; background: rgba(139,92,246,0.2); display: flex; align-items: center; justify-content: center; animation: scrollBounce 2s ease-in-out infinite; color: #8b5cf6; }
        .dark .hero-scroll-icon { background: rgba(255,255,255,0.2); color: white; }
        .hero-scroll-btn:hover .hero-scroll-icon { background: white; color: #8b5cf6; }
        @keyframes scrollBounce { 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(4px); } }
        @media (max-width: 768px) {
            .hero-section { align-items: center; flex-direction: column; padding: 20px 0px 90px; gap: 0; margin-top: 80px; min-height: calc(100vh - 80px); min-height: calc(100svh - 80px); overflow-x: hidden; }
            .hero-left, .hero-right { position: relative; bottom: auto; left: auto; right: auto; max-width: 100%; text-align: center; padding: 0 20px; }
            .hero-socials { justify-content: center; margin-bottom: 20px; }
            .hero-name-bg { display: none; }
            .hero-name-mobile { display: flex; flex-direction: column; align-items: center; font-family: 'Anton', 'Inter', sans-serif; font-weight: 900; font-size: 28vw; text-transform: uppercase; line-height: 0.85; letter-spacing: 0.02em; color: rgba(44,90,142,0.15); text-align: center; z-index: 2; position: absolute; top: 21%; left: 0; right: 0; transform: translateY(-50%); pointer-events: none; user-select: none; width: 100%; }
            .dark .hero-name-mobile { color: rgba(255,255,255,0.85); }
            .hero-photo { margin-bottom: 30px; margin-top: 3vh; position: relative; z-index: 3; width: 100%; }
            .hero-photo img { width: 100%; max-width: none; height: auto; max-height: 60vh; object-fit: cover; object-position: top; }
            .hero-right { text-align: center; margin-top: 20px; }
            .mobile-nav-title { display: none !important; }
        }

<body class="text-slate-900 dark:text-slate-200 selection:bg-emerald-500/30 antialiased overflow-x-hidden transition-colors duration-300 bg-transparent">
